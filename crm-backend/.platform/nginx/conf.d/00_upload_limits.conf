client_max_body_size 200m;

proxy_connect_timeout 300s;
proxy_send_timeout 300s;
proxy_read_timeout 300s;
send_timeout 300s;

# Slow multi-MB photo uploads were tripping nginx's default 60s body/header
# timeouts (observed 408 on PUT /work-orders/:id/edit). Raise to match the 300s
# proxy timeouts so a slow jobsite connection can finish an upload.
client_body_timeout 300s;
client_header_timeout 300s;
